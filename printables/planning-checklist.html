<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Planning Checklist — Goodest Goodbye</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,500;1,8..60,400&display=swap" rel="stylesheet">
<style>


/* ── SCREEN VIEW ── */
* { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:        #F5F1EB;
  --bg-card:   #EDE8DF;
  --text:      #2C2A27;
  --text-mid:  #5A5650;
  --text-muted:#8A857D;
  --sage:      #5C6B52;
  --sage-light:#E8EDE5;
  --clay:      #9E6B52;
  --border:    #C8C2B8;
  --border-light: #DDD8D0;
}

body {
  background: #D0CBC2;
  font-family: 'Source Serif 4', Georgia, serif;
  padding: 2rem;
}

.screen-nav {
  max-width: 680px;
  margin: 0 auto 2rem;
  background: var(--bg);
  border: 1px solid var(--border);
  padding: 1.25rem 1.5rem;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 1rem;
}
.screen-nav-brand {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.125rem;
  font-weight: 500;
  color: var(--text);
}
.screen-nav p {
  font-size: 0.875rem;
  color: var(--text-muted);
  font-style: italic;
}
.print-btn {
  font-family: 'Source Serif 4', serif;
  font-size: 0.875rem;
  padding: 0.5rem 1.25rem;
  border: 1px solid var(--sage);
  background: var(--sage);
  color: #F5F1EB;
  cursor: pointer;
  letter-spacing: 0.03em;
  white-space: nowrap;
}
.print-btn:hover { background: var(--text); border-color: var(--text); }

/* ── PRINTABLE PAGE ── */
.printable {
  width: 680px;
  min-height: 880px;
  margin: 0 auto 2rem;
  background: var(--bg);
  border: 1px solid var(--border);
  padding: 3rem 3.5rem;
  position: relative;
  display: flex;
  flex-direction: column;
}

/* Page header */
.p-header {
  border-bottom: 1px solid var(--border);
  padding-bottom: 1.25rem;
  margin-bottom: 1.5rem;
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  gap: 1rem;
}
.p-header-left {}
.p-eyebrow {
  font-size: 0.6875rem;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--sage);
  font-weight: 500;
  display: block;
  margin-bottom: 0.375rem;
}
.p-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.625rem;
  font-weight: 500;
  color: var(--text);
  line-height: 1.2;
}
.p-brand {
  font-family: 'Cormorant Garamond', serif;
  font-size: 0.8125rem;
  font-weight: 400;
  color: var(--text-muted);
  font-style: italic;
  white-space: nowrap;
  text-align: right;
  line-height: 1.4;
}

/* Page footer */
.p-footer {
  margin-top: auto;
  padding-top: 1.25rem;
  border-top: 1px solid var(--border-light);
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 1rem;
}
.p-footer-note {
  font-size: 0.6875rem;
  color: var(--text-muted);
  font-style: italic;
  line-height: 1.5;
  flex: 1;
}
.p-footer-brand {
  font-family: 'Cormorant Garamond', serif;
  font-size: 0.75rem;
  color: var(--text-muted);
  white-space: nowrap;
}

/* ── PRINTABLE 1: Quality of Life Scorecard ── */
.scorecard-intro {
  font-size: 0.875rem;
  color: var(--text-mid);
  line-height: 1.6;
  margin-bottom: 1.25rem;
  font-style: italic;
}
.scorecard-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 0.75rem;
  margin-bottom: 1rem;
}
.scorecard-table th {
  font-family: 'Source Serif 4', serif;
  font-weight: 500;
  font-size: 0.625rem;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--text-muted);
  padding: 0.375rem 0.25rem;
  text-align: center;
  border-bottom: 1px solid var(--border);
}
.scorecard-table th.dim-header {
  text-align: left;
  width: 140px;
  padding-left: 0;
  letter-spacing: 0.04em;
}
.scorecard-table td {
  border: 0.5px solid var(--border-light);
  padding: 0;
  text-align: center;
  height: 2.25rem;
}
.scorecard-table td.dim-cell {
  border: none;
  border-bottom: 0.5px solid var(--border-light);
  text-align: left;
  padding: 0.375rem 0.5rem 0.375rem 0;
  vertical-align: top;
}
.dim-name {
  font-weight: 500;
  color: var(--text);
  font-size: 0.75rem;
  display: block;
  line-height: 1.3;
}
.dim-sub {
  font-size: 0.625rem;
  color: var(--text-muted);
  font-style: italic;
  line-height: 1.3;
  display: block;
}
.scorecard-table tr:last-child td { border-bottom: none; }
.score-key {
  display: flex;
  gap: 1.25rem;
  margin-bottom: 1rem;
  flex-wrap: wrap;
}
.score-key-item {
  display: flex;
  align-items: center;
  gap: 0.375rem;
  font-size: 0.6875rem;
  color: var(--text-mid);
}
.score-key-dot {
  width: 0.875rem;
  height: 0.875rem;
  border: 0.5px solid var(--border);
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.5625rem;
  color: var(--text-muted);
}
.date-row {
  display: flex;
  gap: 0.25rem;
  margin-bottom: 0.75rem;
  align-items: center;
}
.date-label {
  font-size: 0.6875rem;
  color: var(--text-muted);
  white-space: nowrap;
  margin-right: 0.25rem;
}
.date-box {
  flex: 1;
  height: 1.375rem;
  border: 0.5px solid var(--border);
  background: white;
}

/* ── PRINTABLE 2: Questions to Ask Your Vet ── */
.vet-questions { flex: 1; }
.question-block {
  margin-bottom: 0.875rem;
  padding-bottom: 0.875rem;
  border-bottom: 0.5px solid var(--border-light);
}
.question-block:last-child { border-bottom: none; margin-bottom: 0; }
.question-num {
  font-family: 'Cormorant Garamond', serif;
  font-size: 0.875rem;
  font-weight: 500;
  color: var(--sage);
  display: inline;
  margin-right: 0.375rem;
}
.question-text {
  font-size: 0.875rem;
  color: var(--text);
  font-weight: 500;
  display: inline;
  line-height: 1.4;
}
.answer-line {
  margin-top: 0.375rem;
  height: 1.125rem;
  border-bottom: 0.5px solid var(--border);
  width: 100%;
}
.section-divider {
  font-size: 0.6875rem;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--sage);
  font-weight: 500;
  margin: 1.125rem 0 0.625rem;
  padding-bottom: 0.375rem;
  border-bottom: 1px solid var(--sage-light);
  display: block;
}
.section-divider:first-child { margin-top: 0; }

/* ── PRINTABLE 3: Planning Checklist ── */
.checklist-cols {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 1.5rem;
  flex: 1;
}
.checklist-group { }
.checklist-group-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.125rem;
  font-weight: 500;
  color: var(--text);
  margin-bottom: 0.75rem;
  padding-bottom: 0.5rem;
  border-bottom: 1px solid var(--border);
}
.checklist-item {
  display: flex;
  align-items: flex-start;
  gap: 0.5rem;
  margin-bottom: 0.5625rem;
  font-size: 0.8125rem;
  color: var(--text-mid);
  line-height: 1.4;
}
.checklist-box {
  width: 0.875rem;
  height: 0.875rem;
  border: 0.5px solid var(--border);
  flex-shrink: 0;
  margin-top: 0.125rem;
}
.checklist-write {
  margin-top: 0.25rem;
  height: 1rem;
  border-bottom: 0.5px solid var(--border-light);
  width: 100%;
  margin-left: 1.375rem;
}
.checklist-note {
  font-size: 0.6875rem;
  color: var(--text-muted);
  font-style: italic;
  line-height: 1.5;
  margin-top: 0.375rem;
  margin-left: 1.375rem;
}

/* ── PRINTABLE 4: Telling Your Children ── */
.age-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 1.125rem;
  flex: 1;
}
.age-band {
  border: 0.5px solid var(--border);
  padding: 1rem 1.125rem;
  background: var(--bg-card);
}
.age-band-label {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1rem;
  font-weight: 500;
  color: var(--text);
  display: block;
  margin-bottom: 0.25rem;
}
.age-band-sub {
  font-size: 0.6875rem;
  color: var(--sage);
  letter-spacing: 0.05em;
  text-transform: uppercase;
  font-weight: 500;
  display: block;
  margin-bottom: 0.625rem;
  padding-bottom: 0.5rem;
  border-bottom: 0.5px solid var(--border);
}
.age-band-item {
  font-size: 0.8125rem;
  color: var(--text-mid);
  line-height: 1.5;
  margin-bottom: 0.5rem;
  padding-left: 0.75rem;
  position: relative;
}
.age-band-item::before {
  content: '—';
  position: absolute;
  left: 0;
  color: var(--sage);
  font-size: 0.75rem;
}
.age-band-avoid {
  margin-top: 0.625rem;
  padding-top: 0.5rem;
  border-top: 0.5px solid var(--border-light);
}
.avoid-label {
  font-size: 0.625rem;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--clay);
  font-weight: 500;
  display: block;
  margin-bottom: 0.25rem;
}
.age-band-item.avoid { color: var(--clay); }
.age-band-item.avoid::before { color: var(--clay); }

/* ── PRINTABLE 5: Memorial Information Sheet ── */
.memorial-body { flex: 1; }
.memorial-field {
  margin-bottom: 1.125rem;
}
.memorial-label {
  font-size: 0.6875rem;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--text-muted);
  font-weight: 500;
  display: block;
  margin-bottom: 0.375rem;
}
.memorial-line {
  height: 1.5rem;
  border-bottom: 0.5px solid var(--border);
  width: 100%;
}
.memorial-lines {
  display: flex;
  flex-direction: column;
  gap: 0.375rem;
}
.memorial-cols {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 1.5rem;
}
.memorial-divider {
  border: none;
  border-top: 0.5px solid var(--border-light);
  margin: 1.25rem 0;
}
.memorial-prompt {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1rem;
  font-style: italic;
  color: var(--text-mid);
  margin-bottom: 0.5rem;
  line-height: 1.4;
}
.photo-box {
  border: 0.5px solid var(--border);
  height: 6rem;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--bg-card);
  margin-bottom: 1.125rem;
}
.photo-box-label {
  font-size: 0.6875rem;
  color: var(--text-muted);
  font-style: italic;
}

/* ── PRINTABLE 6: Grief Check-In ── */
.grief-body { flex: 1; display: flex; flex-direction: column; gap: 0; }
.grief-date-row {
  display: flex;
  align-items: center;
  gap: 0.75rem;
  margin-bottom: 1.25rem;
  padding-bottom: 1rem;
  border-bottom: 0.5px solid var(--border-light);
}
.grief-date-label {
  font-size: 0.75rem;
  color: var(--text-muted);
  white-space: nowrap;
}
.grief-date-line {
  flex: 1;
  height: 1.25rem;
  border-bottom: 0.5px solid var(--border);
}
.grief-prompt {
  margin-bottom: 1.125rem;
  flex: 1;
}
.grief-prompt-q {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.0625rem;
  font-style: italic;
  color: var(--text);
  display: block;
  margin-bottom: 0.5rem;
  line-height: 1.4;
}
.grief-lines {
  display: flex;
  flex-direction: column;
  gap: 0.375rem;
}
.grief-line {
  height: 1.375rem;
  border-bottom: 0.5px solid var(--border-light);
}
.grief-note {
  font-size: 0.75rem;
  color: var(--text-muted);
  font-style: italic;
  line-height: 1.6;
  padding: 0.75rem;
  border: 0.5px solid var(--border-light);
  background: var(--bg-card);
  margin-top: 0.75rem;
}

/* ── PRINT STYLES ── */
@media print {
  @page {
    size: letter;
    margin: 0;
  }

  body {
    background: none;
    padding: 0;
    margin: 0;
  }

  .screen-nav { display: none; }

  .printable {
    width: 100%;
    min-height: 100vh;
    height: 100vh;
    margin: 0;
    border: none;
    padding: 0.6in 0.75in;
    page-break-after: always;
    break-after: page;
  }

  .printable:last-child {
    page-break-after: avoid;
    break-after: avoid;
  }

  a { text-decoration: none; color: inherit; }
}


/* Force single printable view */
body { background: #F5F1EB; padding: 1rem; }
.screen-nav { display: none; }
@media print {
  body { background: none; padding: 0; }
  .back-link { display: none; }
  @page { size: letter; margin: 0; }
  .printable { 
    width: 100%; min-height: 100vh; height: 100vh;
    margin: 0; border: none; padding: 0.6in 0.75in;
    page-break-after: avoid;
  }
}
.back-link {
  display: block;
  max-width: 680px;
  margin: 0 auto 1rem;
  font-family: 'Source Serif 4', serif;
  font-size: 0.875rem;
  color: #5A5650;
  text-decoration: none;
  padding: 0.5rem 0;
}
.back-link:hover { color: #2C2A27; }
.print-btn {
  display: block;
  max-width: 680px;
  margin: 0 auto 1.5rem;
  font-family: 'Source Serif 4', serif;
  font-size: 0.875rem;
  padding: 0.625rem 1.5rem;
  background: #5C6B52;
  border: 1px solid #5C6B52;
  color: #F5F1EB;
  cursor: pointer;
  letter-spacing: 0.03em;
  width: fit-content;
}
.print-btn:hover { background: #2C2A27; border-color: #2C2A27; }
</style>
</head>
<body>
<a href="index.html" class="back-link">← Back to all printables</a>
<button class="print-btn" onclick="window.print()">Print this page</button>
<div class="printable">
  <div class="p-header">
    <div class="p-header-left">
      <span class="p-eyebrow">Preparation guide</span>
      <div class="p-title">The planning checklist</div>
    </div>
    <div class="p-brand">Goodest Goodbye<br>goodestgoodbye.com</div>
  </div>


</body>
</html>
